<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MASA — Panel Supervisor</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --rojo: #e2001a; --rojo-oscuro: #b50015;
    --fondo: #f2f2f2; --panel: #ffffff;
    --borde: #e0e0e0; --texto: #1a1a1a; --texto-suave: #666;
    --verde: #27ae60; --verde-claro: #eafaf1;
    --amarillo: #e67e22; --azul: #2980b9; --azul-claro: #eaf4fb;
    --fondo-th: #f8f8f8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--fondo); color: var(--texto); font-family: 'Barlow', sans-serif; min-height: 100vh; }

  /* LOGIN */
  #pantalla-login { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: white; border-radius: 12px; padding: 48px 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
  .login-box svg { height: 52px; margin-bottom: 24px; }
  .login-titulo { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 1px; color: var(--texto-suave); margin-bottom: 20px; }
  .login-rol { display: flex; gap: 10px; margin-bottom: 20px; }
  .rol-btn { flex: 1; padding: 10px; border: 2px solid var(--borde); border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; background: white; color: var(--texto-suave); transition: all 0.2s; }
  .rol-btn.activo { border-color: var(--rojo); background: #fff0f0; color: var(--rojo); }
  .login-input { width: 100%; border: 2px solid var(--borde); border-radius: 8px; padding: 14px; font-size: 24px; text-align: center; letter-spacing: 8px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; outline: none; margin-bottom: 16px; transition: border-color 0.2s; }
  .login-input:focus { border-color: var(--rojo); }
  .login-input.error { border-color: var(--rojo); animation: shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  .btn-login { width: 100%; background: var(--rojo); color: white; border: none; border-radius: 8px; padding: 14px; font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 2px; cursor: pointer; }
  .btn-login:hover { background: var(--rojo-oscuro); }
  .login-error { color: var(--rojo); font-size: 13px; margin-top: 10px; display: none; }

  /* APP */
  #app { display: none; }
  header { background: white; border-bottom: 4px solid var(--rojo); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  header svg { height: 44px; }
  .header-info { display: flex; align-items: center; gap: 12px; }
  .header-rol { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; color: var(--texto-suave); background: #f0f0f0; padding: 4px 12px; border-radius: 20px; }
  .btn-cerrar { background: transparent; border: 1px solid var(--borde); border-radius: 6px; padding: 6px 14px; font-size: 13px; color: var(--texto-suave); cursor: pointer; font-family: 'Barlow', sans-serif; }
  .btn-cerrar:hover { border-color: var(--rojo); color: var(--rojo); }
  .container { max-width: 1300px; margin: 0 auto; padding: 24px 16px 60px; }

  /* CARDS */
  .cards { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 24px; }
  .card { background: white; border-radius: 10px; padding: 18px; border: 1px solid var(--borde); text-align: center; }
  .card-valor { font-family: 'Barlow Condensed', sans-serif; font-size: 34px; font-weight: 800; line-height: 1; }
  .card-label { font-size: 11px; color: var(--texto-suave); letter-spacing: 1px; text-transform: uppercase; margin-top: 5px; }
  .card:nth-child(1) .card-valor { color: var(--rojo); }
  .card:nth-child(2) .card-valor { color: var(--verde); }
  .card:nth-child(3) .card-valor { color: var(--amarillo); }
  .card:nth-child(4) .card-valor { color: var(--azul); }
  .card:nth-child(5) .card-valor { color: #8e44ad; }

  /* FILTROS */
  .filtros-panel { background: white; border: 1px solid var(--borde); border-radius: 10px; padding: 18px 20px; margin-bottom: 20px; }
  .filtros-titulo { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--rojo); margin-bottom: 14px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .tab { padding: 7px 18px; border-radius: 6px; border: 2px solid var(--borde); font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; cursor: pointer; background: white; color: var(--texto-suave); transition: all 0.2s; }
  .tab.activo { background: var(--rojo); border-color: var(--rojo); color: white; }
  .filtros-fila { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .fg { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 150px; }
  .fg label { font-size: 11px; color: var(--texto-suave); font-weight: 600; letter-spacing: 0.5px; }
  select, input[type="date"], input[type="month"] { background: white; border: 1px solid var(--borde); border-radius: 6px; padding: 8px 12px; font-size: 14px; color: var(--texto); font-family: 'Barlow', sans-serif; outline: none; width: 100%; }
  select:focus, input:focus { border-color: var(--rojo); }
  .btn { padding: 8px 18px; border: none; border-radius: 6px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .btn-rojo { background: var(--rojo); color: white; }
  .btn-rojo:hover { background: var(--rojo-oscuro); }
  .btn-verde { background: #217346; color: white; }
  .btn-verde:hover { background: #185c37; }
  .btn-azul { background: var(--azul); color: white; }
  .btn-gris { background: #eee; color: #666; }

  /* ESTADO */
  .badge-estado { display: inline-block; padding: 3px 9px; border-radius: 12px; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; white-space: nowrap; }
  .estado-pendiente { background: #fff3e0; color: #e65100; }
  .estado-supervisor { background: #e3f2fd; color: #1565c0; }
  .estado-aprobado { background: var(--verde-claro); color: var(--verde); }

  /* TABLA */
  .tabla-panel { background: white; border: 1px solid var(--borde); border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
  .tabla-header { padding: 14px 20px; border-bottom: 1px solid var(--borde); display: flex; align-items: center; justify-content: space-between; }
  .tabla-titulo { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: 1px; }
  .tabla-wrapper { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--fondo-th); padding: 10px 12px; text-align: left; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--texto-suave); border-bottom: 1px solid var(--borde); white-space: nowrap; }
  td { padding: 10px 12px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }
  .nombre-cell { font-weight: 600; font-size: 13px; }
  .obra-tag { display: inline-block; background: #f0f0f0; border-radius: 3px; padding: 2px 6px; font-size: 11px; margin: 1px; white-space: nowrap; }
  .horas-n { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 800; color: var(--verde); }
  .horas-e { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 800; color: var(--amarillo); }
  .badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; margin: 1px; }
  .badge-am { background: #fef3e2; color: var(--amarillo); }
  .badge-az { background: var(--azul-claro); color: var(--azul); }
  .badge-ro { background: #fdecea; color: var(--rojo); }
  .btn-sm { border: none; border-radius: 5px; padding: 5px 10px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; margin: 1px; white-space: nowrap; }
  .btn-edit { background: var(--azul); color: white; }
  .btn-val-s { background: #1565c0; color: white; }
  .btn-val-j { background: var(--verde); color: white; }
  .btn-rech { background: #c0392b; color: white; }

  /* MODAL */
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
  .modal.visible { display: flex; }
  .modal-content { background: white; width: 95%; max-width: 780px; border-radius: 10px; padding: 28px; max-height: 92vh; overflow-y: auto; }
  .modal-header { border-bottom: 3px solid var(--rojo); margin-bottom: 20px; padding-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .modal-titulo { font-family: 'Barlow Condensed', sans-serif; font-size: 19px; font-weight: 800; letter-spacing: 1px; }
  .btn-x { background: none; border: none; font-size: 26px; cursor: pointer; color: #999; line-height: 1; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .full { grid-column: span 2; }
  .clabel { display: block; font-size: 11px; color: var(--texto-suave); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  .cinput { width: 100%; border: 1px solid var(--borde); border-radius: 6px; padding: 9px 12px; font-size: 14px; font-family: 'Barlow', sans-serif; outline: none; }
  .cinput:focus { border-color: var(--rojo); }
  .sec-modal { border-top: 1px solid var(--borde); padding-top: 16px; margin-top: 16px; }
  .sec-titulo { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--rojo); margin-bottom: 12px; }
  .pluses-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .plus-pill { padding: 7px 14px; border: 2px solid var(--borde); border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; background: white; color: var(--texto-suave); transition: all 0.2s; user-select: none; }
  .plus-pill.activo { background: var(--amarillo); border-color: var(--amarillo); color: white; }
  .reten-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .reten-pill { padding: 8px; border: 2px solid var(--borde); border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; background: white; color: var(--texto-suave); text-align: center; transition: all 0.2s; }
  .reten-pill.activo { background: var(--azul); border-color: var(--azul); color: white; }
  .obra-card { background: #fafafa; border: 1px solid var(--borde); border-radius: 8px; padding: 14px; margin-bottom: 10px; }
  .obra-card-nombre { font-weight: 700; font-size: 13px; margin-bottom: 10px; color: var(--rojo); }
  .obra-card-fila { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
  .obra-comentario { width: 100%; border: 1px solid var(--borde); border-radius: 5px; padding: 7px 10px; font-size: 13px; font-family: 'Barlow', sans-serif; resize: none; height: 50px; outline: none; }
  .obra-comentario:focus { border-color: var(--rojo); }
  .info-horas { background: #f0f8ff; border: 1px solid #bee3f8; border-radius: 6px; padding: 8px 12px; font-size: 13px; margin-bottom: 12px; }
  .loading { text-align: center; padding: 48px; color: var(--texto-suave); }
  .spinner { width: 30px; height: 30px; border: 3px solid #eee; border-top-color: var(--rojo); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sin-datos { text-align: center; padding: 48px; color: var(--texto-suave); font-size: 15px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #333; color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; z-index: 9999; transition: transform 0.3s; border-left: 4px solid var(--rojo); }
  .toast.visible { transform: translateX(-50%) translateY(0); }
  .toast.ok { border-left-color: var(--verde); }
  @media (max-width:768px) {
    .cards { grid-template-columns: repeat(2,1fr); }
    .grid2 { grid-template-columns: 1fr; }
    .full { grid-column: span 1; }
    .reten-grid { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="pantalla-login">
  <div class="login-box">
    <svg viewBox="0 0 160 50" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="6" width="10" height="38" rx="1" fill="#e2001a" transform="skewX(-12)"/>
      <rect x="14" y="6" width="10" height="38" rx="1" fill="#e2001a" transform="skewX(-12)"/>
      <text x="34" y="38" font-family="Arial Black,sans-serif" font-size="30" font-weight="900" fill="#e2001a" letter-spacing="1">MASA</text>
    </svg>
    <div class="login-titulo">PANEL DE CONTROL</div>
    <div class="login-rol">
      <button class="rol-btn activo" id="rol-supervisor" onclick="selRol('supervisor')">SUPERVISOR</button>
      <button class="rol-btn" id="rol-jefe" onclick="selRol('jefe')">JEFE DE OBRA</button>
    </div>
    <input type="password" class="login-input" id="login-input" placeholder="····" maxlength="6"
      onkeydown="if(event.key==='Enter')login()" />
    <button class="btn-login" onclick="login()">ENTRAR</button>
    <div class="login-error" id="login-error">Contraseña incorrecta</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <svg viewBox="0 0 160 50" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="6" width="10" height="38" rx="1" fill="#e2001a" transform="skewX(-12)"/>
      <rect x="14" y="6" width="10" height="38" rx="1" fill="#e2001a" transform="skewX(-12)"/>
      <text x="34" y="38" font-family="Arial Black,sans-serif" font-size="30" font-weight="900" fill="#e2001a" letter-spacing="1">MASA</text>
    </svg>
    <div class="header-info">
      <div class="header-rol" id="hrol"></div>
      <button class="btn-cerrar" onclick="logout()">Cerrar sesión</button>
    </div>
  </header>

  <div class="container">
    <div class="cards">
      <div class="card"><div class="card-valor" id="c0">—</div><div class="card-label">Partes</div></div>
      <div class="card"><div class="card-valor" id="c1">—</div><div class="card-label">H. Normales</div></div>
      <div class="card"><div class="card-valor" id="c2">—</div><div class="card-label">H. Extra</div></div>
      <div class="card"><div class="card-valor" id="c3">—</div><div class="card-label">Llamadas</div></div>
      <div class="card"><div class="card-valor" id="c4">—</div><div class="card-label">Pendientes</div></div>
    </div>

    <div class="filtros-panel">
      <div class="filtros-titulo">Filtros</div>
      <div class="tabs">
        <div class="tab activo" id="tab-dia" onclick="cambiarVista('dia')">Por Día</div>
        <div class="tab" id="tab-trab" onclick="cambiarVista('trabajador')">Por Trabajador</div>
      </div>
      <div class="filtros-fila">
        <div class="fg" id="fg-f"><label>Fecha</label><input type="date" id="i-fecha"/></div>
        <div class="fg" id="fg-m" style="display:none"><label>Mes</label><input type="month" id="i-mes"/></div>
        <div class="fg" id="fg-t" style="display:none"><label>Trabajador</label><select id="s-trab"><option value="">— Todos —</option></select></div>
        <div class="fg"><label>Obra</label><select id="s-obra"><option value="">— Todas —</option></select></div>
        <div class="fg"><label>Estado</label>
          <select id="s-estado">
            <option value="">— Todos —</option>
            <option value="pendiente">Pendientes</option>
            <option value="supervisor">Validados supervisor</option>
            <option value="aprobado">Aprobados jefe obra</option>
          </select>
        </div>
        <button class="btn btn-rojo" onclick="buscar()">BUSCAR</button>
        <button class="btn btn-verde" onclick="xlsObras()">⬇ OBRAS</button>
        <button class="btn btn-azul" onclick="xlsNominas()">⬇ NÓMINAS</button>
      </div>
    </div>

    <div id="resultados"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-titulo" id="m-titulo">EDITAR PARTE</div>
      <button class="btn-x" onclick="cerrarModal()">×</button>
    </div>
    <input type="hidden" id="m-id"/>
    <div class="grid2">
      <div>
        <label class="clabel">Turno</label>
        <select class="cinput" id="m-turno">
          <option value="mañana">Mañana (8h) 07:00–15:00</option>
          <option value="noche">Noche (12h) 07:00–19:00</option>
          <option value="especial">Especial</option>
        </select>
      </div>
      <div>
        <label class="clabel">Llamadas al retén</label>
        <div style="display:flex;align-items:center;gap:10px;margin-top:2px">
          <button onclick="adjLlam(-1)" style="width:34px;height:34px;border:1px solid #ddd;border-radius:5px;font-size:18px;cursor:pointer;background:white">−</button>
          <span id="m-llam-num" style="font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;min-width:28px;text-align:center">0</span>
          <button onclick="adjLlam(1)" style="width:34px;height:34px;border:1px solid #ddd;border-radius:5px;font-size:18px;cursor:pointer;background:white">+</button>
          <input type="hidden" id="m-llam" value="0"/>
        </div>
      </div>
    </div>
    <div class="sec-modal">
      <div class="sec-titulo">Pluses del día</div>
      <div class="pluses-grid">
        <div class="plus-pill" data-plus="nocturnidad" onclick="this.classList.toggle('activo')">Nocturnidad</div>
        <div class="plus-pill" data-plus="turnicidad" onclick="this.classList.toggle('activo')">Turnicidad</div>
        <div class="plus-pill" data-plus="entrada" onclick="this.classList.toggle('activo')">Entrada al Complejo</div>
        <div class="plus-pill" data-plus="taller" onclick="this.classList.toggle('activo')">Plus Taller</div>
      </div>
    </div>
    <div class="sec-modal">
      <div class="sec-titulo">Retén</div>
      <div class="reten-grid">
        <div class="reten-pill" data-reten="ninguno" onclick="selReten(this)">Sin retén</div>
        <div class="reten-pill" data-reten="diario" onclick="selReten(this)">Diario</div>
        <div class="reten-pill" data-reten="fin_de_semana" onclick="selReten(this)">Fin de Semana</div>
        <div class="reten-pill" data-reten="festivo" onclick="selReten(this)">Festivo</div>
        <div class="reten-pill" data-reten="semanal" onclick="selReten(this)" style="grid-column:span 4">Semanal</div>
      </div>
    </div>
    <div class="sec-modal">
      <div class="sec-titulo">Obras y horas</div>
      <div class="info-horas" id="m-info"></div>
      <div id="m-obras"></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px;border-top:1px solid var(--borde);padding-top:16px">
      <button class="btn btn-gris" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-rojo" onclick="guardar()">GUARDAR CAMBIOS</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SU='https://mudtiqquxycgrzisiydu.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11ZHRpcXF1eHljZ3J6aXNpeWR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxODUxNTgsImV4cCI6MjA5MTc2MTE1OH0.fNKzBcz1wmPccXGy2gWpe78tSzTQj5-z9xYeh2BddoM';
const H={'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK};
const PASS_S='3254', PASS_J='7788'; // supervisor / jefe de obra

let rol='supervisor', vista='dia', trabajadores=[], obras=[], festivos=[], datos=[], llamModal=0;

function selRol(r){rol=r;document.getElementById('rol-supervisor').classList.toggle('activo',r==='supervisor');document.getElementById('rol-jefe').classList.toggle('activo',r==='jefe');}

function login(){
  const v=document.getElementById('login-input').value;
  const ok=(rol==='supervisor'&&v===PASS_S)||(rol==='jefe'&&v===PASS_J);
  if(ok){
    document.getElementById('pantalla-login').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('hrol').textContent=rol==='supervisor'?'SUPERVISOR':'JEFE DE OBRA';
    init();
  } else {
    const i=document.getElementById('login-input');
    i.classList.add('error');
    document.getElementById('login-error').style.display='block';
    setTimeout(()=>i.classList.remove('error'),400);
  }
}

function logout(){
  document.getElementById('pantalla-login').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('login-input').value='';
  document.getElementById('login-error').style.display='none';
}

async function init(){
  const hoy=new Date().toISOString().split('T')[0];
  document.getElementById('i-fecha').value=hoy;
  document.getElementById('i-mes').value=hoy.slice(0,7);
  const[rT,rO,rF]=await Promise.all([
    fetch(SU+'/rest/v1/trabajadores?activo=eq.true&order=nombre',{headers:H}),
    fetch(SU+'/rest/v1/obras?activa=eq.true&order=nombre',{headers:H}),
    fetch(SU+'/rest/v1/festivos?select=fecha',{headers:H})
  ]);
  trabajadores=await rT.json();obras=await rO.json();
  festivos=(await rF.json()).map(f=>f.fecha);
  const st=document.getElementById('s-trab');
  trabajadores.forEach(t=>{const o=new Option(t.nombre,t.id);st.add(o);});
  const so=document.getElementById('s-obra');
  obras.forEach(o=>{const op=new Option(o.nombre,o.id);so.add(op);});
  buscar();
}

function cambiarVista(v){
  vista=v;
  document.getElementById('tab-dia').classList.toggle('activo',v==='dia');
  document.getElementById('tab-trab').classList.toggle('activo',v==='trabajador');
  document.getElementById('fg-f').style.display=v==='dia'?'flex':'none';
  document.getElementById('fg-m').style.display=v==='trabajador'?'flex':'none';
  document.getElementById('fg-t').style.display=v==='trabajador'?'flex':'none';
  buscar();
}

async function buscar(){
  document.getElementById('resultados').innerHTML='<div class="loading"><div class="spinner"></div>Cargando...</div>';
  let url=SU+'/rest/v1/partes?select=*,trabajadores(nombre),partes_obras(*,obras(nombre))&order=created_at.desc';
  if(vista==='dia'){const f=document.getElementById('i-fecha').value;if(f)url+='&fecha=eq.'+f;}
  else{
    const tid=document.getElementById('s-trab').value;
    const mes=document.getElementById('i-mes').value;
    if(tid)url+='&trabajador_id=eq.'+tid;
    if(mes)url+='&fecha=gte.'+mes+'-01&fecha=lte.'+mes+'-31';
  }
  const est=document.getElementById('s-estado').value;
  if(est==='pendiente')url+='&validado_jefe_equipo=eq.false';
  else if(est==='supervisor')url+='&validado_jefe_equipo=eq.true&validado_jefe_obra=eq.false';
  else if(est==='aprobado')url+='&validado_jefe_obra=eq.true';
  const res=await fetch(url,{headers:H});
  let partes=await res.json();
  const of=document.getElementById('s-obra').value;
  if(of)partes=partes.filter(p=>p.partes_obras?.some(po=>po.obra_id==of));
  datos=partes;
  cards(partes);
  vista==='dia'?renderDia(partes):renderTrab(partes);
}

function cards(p){
  document.getElementById('c0').textContent=p.length;
  document.getElementById('c1').textContent=p.reduce((s,x)=>s+(x.horas_normales||0),0).toFixed(1);
  document.getElementById('c2').textContent=p.reduce((s,x)=>s+(x.horas_extra||0),0).toFixed(1);
  document.getElementById('c3').textContent=p.reduce((s,x)=>s+(x.llamadas||0),0);
  document.getElementById('c4').textContent=p.filter(x=>!x.validado_jefe_equipo).length;
}

function estadoBadge(p){
  if(p.validado_jefe_obra)return'<span class="badge-estado estado-aprobado">✓ APROBADO</span>';
  if(p.validado_jefe_equipo)return'<span class="badge-estado estado-supervisor">● SUPERVISOR OK</span>';
  return'<span class="badge-estado estado-pendiente">○ PENDIENTE</span>';
}

function acciones(p){
  let h=`<button class="btn-sm btn-edit" onclick="abrirModal('${p.id}')">EDITAR</button>`;
  if(rol==='supervisor'&&!p.validado_jefe_equipo)
    h+=`<button class="btn-sm btn-val-s" onclick="validar('${p.id}','supervisor')">✓ VALIDAR</button>`;
  if(rol==='jefe'&&p.validado_jefe_equipo&&!p.validado_jefe_obra){
    h+=`<button class="btn-sm btn-val-j" onclick="validar('${p.id}','jefe')">✓ APROBAR</button>`;
    h+=`<button class="btn-sm btn-rech" onclick="devolver('${p.id}')">✗ DEVOLVER</button>`;
  }
  return h;
}

function renderDia(partes){
  if(!partes.length){document.getElementById('resultados').innerHTML='<div class="tabla-panel"><div class="sin-datos">📋 No hay partes para esta búsqueda</div></div>';return;}
  const f=document.getElementById('i-fecha').value;
  const fs=f?new Date(f+'T12:00:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):'';
  let h=`<div class="tabla-panel"><div class="tabla-header"><div class="tabla-titulo">${fs}</div><div style="font-size:13px;color:var(--texto-suave)">${partes.length} parte${partes.length!==1?'s':''}</div></div>
  <div class="tabla-wrapper"><table><thead><tr>
    <th>Trabajador</th><th>Turno</th><th>Obras</th><th>H.Norm</th><th>H.Extra</th><th>Pluses</th><th>Retén</th><th>Llam.</th><th>Estado</th><th>Acciones</th>
  </tr></thead><tbody>`;
  const rm={ninguno:'—',diario:'Diario',fin_de_semana:'F.Sem',festivo:'Fest',semanal:'Sem'};
  partes.forEach(p=>{
    const obs=p.partes_obras||[];
    const pl=[];
    if(p.plus_nocturnidad)pl.push('<span class="badge badge-az">NOCT</span>');
    if(p.plus_turnicidad)pl.push('<span class="badge badge-az">TURN</span>');
    if(p.plus_entrada)pl.push('<span class="badge badge-am">ENTR</span>');
    if(p.plus_taller)pl.push('<span class="badge badge-am">TALL</span>');
    h+=`<tr>
      <td><div class="nombre-cell">${p.trabajadores?.nombre||'—'}</div></td>
      <td><span class="badge badge-az">${p.turno==='mañana'?'8H':'12H'}</span></td>
      <td>${obs.map(o=>`<span class="obra-tag">${o.obras?.nombre||'—'} <b>${o.horas}h</b></span>`).join('')}</td>
      <td><span class="horas-n">${p.horas_normales||0}</span></td>
      <td><span class="horas-e">${p.horas_extra||0}</span></td>
      <td>${pl.join('')||'—'}</td>
      <td>${rm[p.reten]||'—'}</td>
      <td>${p.llamadas>0?`<span class="badge badge-ro">${p.llamadas}</span>`:'0'}</td>
      <td>${estadoBadge(p)}</td>
      <td style="white-space:nowrap">${acciones(p)}</td>
    </tr>`;
  });
  h+='</tbody></table></div></div>';
  document.getElementById('resultados').innerHTML=h;
}

function renderTrab(partes){
  if(!partes.length){document.getElementById('resultados').innerHTML='<div class="tabla-panel"><div class="sin-datos">📋 No hay partes para esta búsqueda</div></div>';return;}
  const grupos={};
  partes.forEach(p=>{const n=p.trabajadores?.nombre||'?';if(!grupos[n])grupos[n]=[];grupos[n].push(p);});
  let html='';
  const rm={ninguno:'—',diario:'Diario',fin_de_semana:'F.Sem',festivo:'Fest',semanal:'Sem'};
  Object.entries(grupos).sort().forEach(([nombre,pts])=>{
    const tN=pts.reduce((s,p)=>s+(p.horas_normales||0),0);
    const tE=pts.reduce((s,p)=>s+(p.horas_extra||0),0);
    const tL=pts.reduce((s,p)=>s+(p.llamadas||0),0);
    const pend=pts.filter(p=>!p.validado_jefe_equipo).length;
    html+=`<div class="tabla-panel" style="margin-bottom:16px">
      <div class="tabla-header">
        <div class="tabla-titulo">${nombre}</div>
        <div style="display:flex;gap:16px;align-items:center">
          <span style="font-size:13px"><b style="color:var(--verde)">${tN.toFixed(1)}h</b> norm · <b style="color:var(--amarillo)">${tE.toFixed(1)}h</b> extra · <b style="color:var(--azul)">${tL}</b> llam.</span>
          ${pend>0?`<span class="badge-estado estado-pendiente">${pend} pendiente${pend>1?'s':''}</span>`:''}
        </div>
      </div>
      <div class="tabla-wrapper"><table><thead><tr>
        <th>Fecha</th><th>Turno</th><th>Obras</th><th>H.Norm</th><th>H.Extra</th><th>Pluses</th><th>Retén</th><th>Estado</th><th>Acciones</th>
      </tr></thead><tbody>`;
    pts.sort((a,b)=>a.fecha>b.fecha?1:-1).forEach(p=>{
      const obs=p.partes_obras||[];
      const pl=[];
      if(p.plus_nocturnidad)pl.push('NOCT');if(p.plus_turnicidad)pl.push('TURN');
      if(p.plus_entrada)pl.push('ENTR');if(p.plus_taller)pl.push('TALL');
      const fs=new Date(p.fecha+'T12:00:00').toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
      html+=`<tr>
        <td style="white-space:nowrap;font-weight:600">${fs}</td>
        <td><span class="badge badge-az">${p.turno==='mañana'?'8H':'12H'}</span></td>
        <td>${obs.map(o=>`<div><span class="obra-tag">${o.obras?.nombre||'—'} <b>${o.horas}h</b></span>${o.comentarios?`<div style="font-size:11px;color:var(--texto-suave);font-style:italic">"${o.comentarios}"</div>`:''}</div>`).join('')}</td>
        <td><span class="horas-n">${p.horas_normales||0}</span></td>
        <td><span class="horas-e">${p.horas_extra||0}</span></td>
        <td>${pl.map(x=>`<span class="badge badge-am">${x}</span>`).join('')||'—'}</td>
        <td>${rm[p.reten]||'—'}${p.llamadas>0?` <span class="badge badge-ro">${p.llamadas}llam</span>`:''}</td>
        <td>${estadoBadge(p)}</td>
        <td style="white-space:nowrap">${acciones(p)}</td>
      </tr>`;
    });
    html+='</tbody></table></div></div>';
  });
  document.getElementById('resultados').innerHTML=html;
}

async function validar(id,tipo){
  const body=tipo==='supervisor'?{validado_jefe_equipo:true}:{validado_jefe_obra:true};
  await fetch(SU+'/rest/v1/partes?id=eq.'+id,{method:'PATCH',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify(body)});
  toast(tipo==='supervisor'?'Validado por supervisor ✓':'Aprobado por jefe de obra ✓',true);
  buscar();
}

async function devolver(id){
  await fetch(SU+'/rest/v1/partes?id=eq.'+id,{method:'PATCH',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify({validado_jefe_equipo:false,validado_jefe_obra:false})});
  toast('Parte devuelto para revisión',false);buscar();
}

function esFD(fecha){const d=new Date(fecha+'T12:00:00');return d.getDay()===0||d.getDay()===6||festivos.includes(fecha);}

function abrirModal(id){
  const p=datos.find(x=>x.id==id);if(!p)return;
  document.getElementById('m-id').value=p.id;
  document.getElementById('m-titulo').innerHTML='EDITAR: <span style="color:var(--rojo)">'+p.trabajadores?.nombre+'</span> — '+p.fecha;
  document.getElementById('m-turno').value=p.turno;
  llamModal=p.llamadas||0;
  document.getElementById('m-llam').value=llamModal;
  document.getElementById('m-llam-num').textContent=llamModal;
  document.querySelectorAll('.plus-pill').forEach(pill=>pill.classList.toggle('activo',!!p['plus_'+pill.dataset.plus]));
  document.querySelectorAll('.reten-pill').forEach(pill=>pill.classList.toggle('activo',pill.dataset.reten===(p.reten||'ninguno')));
  recalcInfo(p);
  const cont=document.getElementById('m-obras');cont.innerHTML='';
  (p.partes_obras||[]).forEach(o=>{
    const d=document.createElement('div');d.className='obra-card';d.dataset.poId=o.id;
    d.innerHTML=`<div class="obra-card-nombre">📁 ${o.obras?.nombre||'—'}</div>
      <div class="obra-card-fila">
        <div><label class="clabel">Horas en esta obra</label>
          <input type="number" class="cinput edit-h" value="${o.horas||0}" min="0.5" max="24" step="0.5" oninput="recalcInfoById('${p.id}')"/></div>
        <div><label class="clabel">Cambiar obra</label>
          <select class="cinput edit-obra">${obras.map(ob=>`<option value="${ob.id}"${ob.id==o.obra_id?' selected':''}>${ob.nombre}</option>`).join('')}</select></div>
      </div>
      <textarea class="obra-comentario" placeholder="Comentario...">${o.comentarios||''}</textarea>`;
    cont.appendChild(d);
  });
  document.getElementById('modal').classList.add('visible');
}

function recalcInfo(p){
  const total=(p.partes_obras||[]).reduce((s,o)=>s+(o.horas||0),0);
  const esp=esFD(p.fecha);
  const n=esp?0:Math.min(total,8),e=esp?total:Math.max(0,total-8);
  document.getElementById('m-info').innerHTML=`Total del día: <b>${total}h</b> → <span style="color:var(--verde)">${n}h normales</span> + <span style="color:var(--amarillo)">${e}h extra</span>${esp?' <b>(fin de semana / festivo)</b>':''}`;
}

function recalcInfoById(pid){
  const p=datos.find(x=>x.id==pid);if(!p)return;
  const hs=Array.from(document.querySelectorAll('.edit-h')).map(i=>parseFloat(i.value)||0);
  const total=hs.reduce((s,h)=>s+h,0);
  const esp=esFD(p.fecha);
  const n=esp?0:Math.min(total,8),e=esp?total:Math.max(0,total-8);
  document.getElementById('m-info').innerHTML=`Total del día: <b>${total}h</b> → <span style="color:var(--verde)">${n}h normales</span> + <span style="color:var(--amarillo)">${e}h extra</span>${esp?' <b>(fin de semana / festivo)</b>':''}`;
}

function selReten(el){document.querySelectorAll('.reten-pill').forEach(p=>p.classList.remove('activo'));el.classList.add('activo');}
function adjLlam(d){llamModal=Math.max(0,llamModal+d);document.getElementById('m-llam').value=llamModal;document.getElementById('m-llam-num').textContent=llamModal;}
function cerrarModal(){document.getElementById('modal').classList.remove('visible');}

async function guardar(){
  const id=document.getElementById('m-id').value;
  const p=datos.find(x=>x.id==id);if(!p)return;
  const cards=document.querySelectorAll('.obra-card');
  let total=0;const obs=[];
  cards.forEach(c=>{
    const h=parseFloat(c.querySelector('.edit-h').value)||0;total+=h;
    obs.push({id:c.dataset.poId,obra_id:parseInt(c.querySelector('.edit-obra').value),horas:h,comentarios:c.querySelector('.obra-comentario').value||null});
  });
  const esp=esFD(p.fecha);
  const hn=esp?0:Math.min(total,8);
  const he=(esp?total:Math.max(0,total-8))+(llamModal*2);
  const pN=document.querySelector('[data-plus="nocturnidad"]').classList.contains('activo');
  const pT=document.querySelector('[data-plus="turnicidad"]').classList.contains('activo');
  const pE=document.querySelector('[data-plus="entrada"]').classList.contains('activo');
  const pTa=document.querySelector('[data-plus="taller"]').classList.contains('activo');
  const ret=document.querySelector('.reten-pill.activo')?.dataset.reten||'ninguno';
  await fetch(SU+'/rest/v1/partes?id=eq.'+id,{method:'PATCH',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify({
    turno:document.getElementById('m-turno').value,llamadas:llamModal,reten:ret,
    plus_nocturnidad:pN,plus_turnicidad:pT,plus_entrada:pE,plus_taller:pTa,
    total_horas:total,horas_normales:hn,horas_extra:he,
    validado_jefe_equipo:false,validado_jefe_obra:false
  })});
  for(const o of obs){
    await fetch(SU+'/rest/v1/partes_obras?id=eq.'+o.id,{method:'PATCH',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify({obra_id:o.obra_id,horas:o.horas,comentarios:o.comentarios})});
  }
  cerrarModal();toast('Cambios guardados ✓',true);buscar();
}

// ─── EXCEL OBRAS ──────────────────────────────────────────
function xlsObras(){
  if(!datos.length){alert('No hay datos');return;}
  const filas=[];
  datos.forEach(p=>{
    const obs=p.partes_obras||[];
    let acum=0;
    const esp=esFD(p.fecha);
    obs.forEach(o=>{
      const h=o.horas||0;
      let hN=0,hE=0;
      if(esp){hE=h;}
      else{const nA=Math.min(acum,8),nD=Math.min(acum+h,8);hN=nD-nA;hE=h-hN;}
      acum+=h;
      filas.push({
        'Fecha':p.fecha,'Trabajador':p.trabajadores?.nombre||'',
        'Turno':p.turno,'Nº Proyecto / Obra':o.obras?.nombre||'',
        'Horas Obra':h,'H. Normales':hN,'H. Extra':hE,
        'Plus Nocturnidad':p.plus_nocturnidad?'SÍ':'',
        'Plus Turnicidad':p.plus_turnicidad?'SÍ':'',
        'Plus Entrada':p.plus_entrada?'SÍ':'',
        'Plus Taller':p.plus_taller?'SÍ':'',
        'Retén':p.reten!=='ninguno'?p.reten:'',
        'Llamadas Retén':p.llamadas||0,
        'Estado':p.validado_jefe_obra?'Aprobado':p.validado_jefe_equipo?'Supervisor OK':'Pendiente',
        'Comentario':o.comentarios||''
      });
    });
  });
  const ws=XLSX.utils.json_to_sheet(filas);
  ws['!cols']=[{wch:12},{wch:35},{wch:10},{wch:35},{wch:10},{wch:11},{wch:10},{wch:16},{wch:16},{wch:14},{wch:12},{wch:14},{wch:14},{wch:12},{wch:40}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Control Obras');
  XLSX.writeFile(wb,'MASA_Obras_'+new Date().toISOString().split('T')[0]+'.xlsx');
}

// ─── EXCEL NÓMINAS ────────────────────────────────────────
function xlsNominas(){
  if(!datos.length){alert('No hay datos');return;}
  const wb=XLSX.utils.book_new();
  const grupos={};
  datos.forEach(p=>{const n=p.trabajadores?.nombre||'?';if(!grupos[n])grupos[n]=[];grupos[n].push(p);});

  // Hoja resumen
  const res=[];
  Object.entries(grupos).sort().forEach(([n,pts])=>{
    res.push({
      'Trabajador':n,'Días trabajados':pts.length,
      'H. Normales':pts.reduce((s,p)=>s+(p.horas_normales||0),0).toFixed(1),
      'H. Extra':pts.reduce((s,p)=>s+(p.horas_extra||0),0).toFixed(1),
      'Nocturnidad (días)':pts.filter(p=>p.plus_nocturnidad).length,
      'Turnicidad (días)':pts.filter(p=>p.plus_turnicidad).length,
      'Entrada Complejo (días)':pts.filter(p=>p.plus_entrada).length,
      'Plus Taller (días)':pts.filter(p=>p.plus_taller).length,
      'Retén Diario':pts.filter(p=>p.reten==='diario').length,
      'Retén Fin Semana':pts.filter(p=>p.reten==='fin_de_semana').length,
      'Retén Festivo':pts.filter(p=>p.reten==='festivo').length,
      'Retén Semanal':pts.filter(p=>p.reten==='semanal').length,
      'Total Llamadas':pts.reduce((s,p)=>s+(p.llamadas||0),0)
    });
  });
  const wsR=XLSX.utils.json_to_sheet(res);
  wsR['!cols']=[{wch:35},{wch:14},{wch:12},{wch:10},{wch:18},{wch:18},{wch:20},{wch:16},{wch:14},{wch:18},{wch:16},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb,wsR,'RESUMEN');

  // Una hoja por trabajador
  Object.entries(grupos).sort().forEach(([n,pts])=>{
    const filas=pts.sort((a,b)=>a.fecha>b.fecha?1:-1).map(p=>({
      'Fecha':p.fecha,'Turno':p.turno,
      'H. Normales':p.horas_normales||0,'H. Extra':p.horas_extra||0,
      'Nocturnidad':p.plus_nocturnidad?'SÍ':'','Turnicidad':p.plus_turnicidad?'SÍ':'',
      'Entrada':p.plus_entrada?'SÍ':'','Plus Taller':p.plus_taller?'SÍ':'',
      'Retén':p.reten!=='ninguno'?p.reten:'','Llamadas':p.llamadas||0,
      'Obras':(p.partes_obras||[]).map(o=>(o.obras?.nombre||'?')+'('+o.horas+'h)').join(' | ')
    }));
    filas.push({'Fecha':'TOTAL','Turno':'',
      'H. Normales':pts.reduce((s,p)=>s+(p.horas_normales||0),0).toFixed(1),
      'H. Extra':pts.reduce((s,p)=>s+(p.horas_extra||0),0).toFixed(1),
      'Nocturnidad':pts.filter(p=>p.plus_nocturnidad).length+' días',
      'Turnicidad':pts.filter(p=>p.plus_turnicidad).length+' días',
      'Entrada':pts.filter(p=>p.plus_entrada).length+' días',
      'Plus Taller':pts.filter(p=>p.plus_taller).length+' días',
      'Retén':'','Llamadas':pts.reduce((s,p)=>s+(p.llamadas||0),0),'Obras':''
    });
    const ws=XLSX.utils.json_to_sheet(filas);
    ws['!cols']=[{wch:12},{wch:10},{wch:12},{wch:10},{wch:12},{wch:12},{wch:10},{wch:12},{wch:14},{wch:10},{wch:50}];
    XLSX.utils.book_append_sheet(wb,ws,n.substring(0,31));
  });
  const mes=document.getElementById('i-mes').value||new Date().toISOString().slice(0,7);
  XLSX.writeFile(wb,'MASA_Nominas_'+mes+'.xlsx');
}

function toast(msg,ok){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className='toast visible'+(ok?' ok':'');
  setTimeout(()=>t.classList.remove('visible'),3000);
}
</script>
