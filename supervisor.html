<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MASA — Panel Supervisor (Edit)</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --rojo: #e2001a;
    --rojo-oscuro: #b50015;
    --fondo: #f4f4f4;
    --panel: #ffffff;
    --borde: #e0e0e0;
    --texto: #1a1a1a;
    --texto-suave: #666;
    --verde: #27ae60;
    --amarillo: #e67e22;
    --azul: #2980b9;
    --fondo-th: #f8f8f8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--fondo);
    color: var(--texto);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
  }

  /* LOGIN */
  #pantalla-login {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--fondo);
  }

  .login-box {
    background: white;
    border-radius: 12px;
    padding: 48px 40px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 380px;
    text-align: center;
  }

  .login-box svg { height: 52px; margin-bottom: 24px; }

  .login-titulo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--texto-suave);
    margin-bottom: 28px;
  }

  .login-input {
    width: 100%;
    border: 2px solid var(--borde);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 24px;
    text-align: center;
    letter-spacing: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .login-input:focus { border-color: var(--rojo); }

  .login-input.error { border-color: var(--rojo); animation: shake 0.3s; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .btn-login {
    width: 100%;
    background: var(--rojo);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-login:hover { background: var(--rojo-oscuro); }

  .login-error {
    color: var(--rojo);
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }

  /* HEADER */
  #app { display: none; }

  header {
    background: white;
    border-bottom: 4px solid var(--rojo);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  header svg { height: 44px; }

  .header-titulo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--texto-suave);
    text-transform: uppercase;
  }

  .btn-cerrar {
    background: transparent;
    border: 1px solid var(--borde);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--texto-suave);
    cursor: pointer;
    font-family: 'Barlow', sans-serif;
    transition: all 0.2s;
  }

  .btn-cerrar:hover { border-color: var(--rojo); color: var(--rojo); }

  /* CONTENEDOR */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* TARJETAS RESUMEN */
  .resumen-cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .card {
    background: white;
    border-radius: 10px;
    padding: 20px;
    border: 1px solid var(--borde);
    text-align: center;
  }

  .card-valor {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 38px;
    font-weight: 800;
    line-height: 1;
  }

  .card-label {
    font-size: 12px;
    color: var(--texto-suave);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .card:nth-child(1) .card-valor { color: var(--rojo); }
  .card:nth-child(2) .card-valor { color: var(--verde); }
  .card:nth-child(3) .card-valor { color: var(--amarillo); }
  .card:nth-child(4) .card-valor { color: var(--azul); }

  /* FILTROS */
  .filtros-panel {
    background: white;
    border: 1px solid var(--borde);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .filtros-titulo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--rojo);
    margin-bottom: 16px;
  }

  /* TABS VISTA */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .tab {
    padding: 8px 20px;
    border-radius: 6px;
    border: 2px solid var(--borde);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    background: white;
    color: var(--texto-suave);
  }

  .tab.activo {
    background: var(--rojo);
    border-color: var(--rojo);
    color: white;
  }

  .filtros-fila {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .filtro-grupo {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    min-width: 160px;
  }

  .filtro-label {
    font-size: 12px;
    color: var(--texto-suave);
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  select, input[type="date"] {
    background: white;
    border: 1px solid var(--borde);
    border-radius: 6px;
    padding: 9px 12px;
    font-size: 14px;
    color: var(--texto);
    font-family: 'Barlow', sans-serif;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  select:focus, input[type="date"]:focus { border-color: var(--rojo); }

  .btn-buscar {
    background: var(--rojo);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 9px 24px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .btn-buscar:hover { background: var(--rojo-oscuro); }

  .btn-excel {
    background: #217346;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 9px 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .btn-excel:hover { background: #185c37; }

  /* TABLA */
  .tabla-panel {
    background: white;
    border: 1px solid var(--borde);
    border-radius: 10px;
    overflow: hidden;
  }

  .tabla-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--borde);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .tabla-titulo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .tabla-count {
    font-size: 13px;
    color: var(--texto-suave);
  }

  .tabla-wrapper { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  th {
    background: var(--fondo-th);
    padding: 12px 14px;
    text-align: left;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--texto-suave);
    border-bottom: 1px solid var(--borde);
    white-space: nowrap;
  }

  td {
    padding: 12px 14px;
    border-bottom: 1px solid #f0f0f0;
    vertical-align: top;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }

  .nombre-trabajador {
    font-weight: 600;
    font-size: 13px;
    line-height: 1.3;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin: 2px 2px 2px 0;
  }

  .badge-verde { background: #e8f8f0; color: var(--verde); }
  .badge-amarillo { background: #fef3e2; color: var(--amarillo); }
  .badge-azul { background: #eaf4fb; color: var(--azul); }
  .badge-rojo { background: #fdecea; color: var(--rojo); }
  .badge-gris { background: #f0f0f0; color: #888; }

  .horas-cell {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
  }

  .horas-normales { color: var(--verde); }
  .horas-extra { color: var(--amarillo); }

  .obra-tag {
    display: inline-block;
    background: #f0f0f0;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 12px;
    margin: 2px 2px 2px 0;
    line-height: 1.4;
  }

  .comentario-texto {
    font-size: 12px;
    color: var(--texto-suave);
    font-style: italic;
    margin-top: 3px;
  }

  /* EXPANDIBLE */
  .fila-detalle {
    background: #fafafa;
    display: none;
  }

  .fila-detalle.visible { display: table-row; }

  .detalle-contenido {
    padding: 12px 14px 16px 40px;
    border-bottom: 1px solid #f0f0f0;
  }

  .detalle-header-flex {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .detalle-obras {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .detalle-obra-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    background: white;
    border: 1px solid var(--borde);
    border-radius: 6px;
    padding: 10px 14px;
  }

  .detalle-obra-nombre {
    font-weight: 600;
    font-size: 13px;
    flex: 1;
  }

  .detalle-obra-horas {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--rojo);
    white-space: nowrap;
  }

  .detalle-obra-comentario {
    font-size: 12px;
    color: var(--texto-suave);
    font-style: italic;
    margin-top: 3px;
  }

  .btn-expandir {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--texto-suave);
    font-size: 16px;
    padding: 0 4px;
    transition: transform 0.2s;
  }

  .btn-expandir.abierto { transform: rotate(90deg); }

  /* BOTONES ACCION */
  .acciones-parte {
    display: flex;
    gap: 8px;
  }

  .btn-accion {
    padding: 6px 12px;
    border-radius: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
  }

  .btn-edit { background: #eaf4fb; color: var(--azul); border-color: #d0e4f5; }
  .btn-delete { background: #fdecea; color: var(--rojo); border-color: #f9d2d0; }
  .btn-edit:hover { background: var(--azul); color: white; }
  .btn-delete:hover { background: var(--rojo); color: white; }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 48px;
    color: var(--texto-suave);
    font-size: 15px;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #eee;
    border-top-color: var(--rojo);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .sin-datos {
    text-align: center;
    padding: 48px;
    color: var(--texto-suave);
  }

  .sin-datos-icono { font-size: 48px; margin-bottom: 12px; }

  /* VISTA POR TRABAJADOR */
  .trabajador-seccion {
    background: white;
    border: 1px solid var(--borde);
    border-radius: 10px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .trabajador-seccion-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--borde);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fafafa;
  }

  .trabajador-seccion-nombre {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .trabajador-resumen {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .trab-res-item {
    text-align: center;
  }

  .trab-res-valor {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 800;
  }

  .trab-res-label {
    font-size: 10px;
    color: var(--texto-suave);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }

  .modal-content {
    background: white;
    border-radius: 12px;
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  }

  .modal-titulo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 20px;
    border-bottom: 2px solid var(--rojo);
    padding-bottom: 10px;
  }

  .grid-edit {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 20px;
  }

  .input-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 5px;
    color: var(--texto-suave);
  }

  .input-edit {
    width: 100%;
    padding: 10px;
    border: 1px solid var(--borde);
    border-radius: 6px;
    font-family: 'Barlow', sans-serif;
  }

  .edit-obras-list {
    background: #f9f9f9;
    padding: 15px;
    border-radius: 8px;
    margin-top: 20px;
  }

  .edit-obra-card {
    background: white;
    border: 1px solid var(--borde);
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 10px;
  }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 25px;
  }

  .btn-save { background: var(--verde); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; }
  .btn-cancel { background: #eee; color: var(--texto); border: none; padding: 10px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; }

  @media (max-width: 768px) {
    .resumen-cards { grid-template-columns: repeat(2, 1fr); }
    .filtros-fila { flex-direction: column; }
    .btn-buscar, .btn-excel { width: 100%; }
    .grid-edit { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="pantalla-login">
  <div class="login-box">
    <svg viewBox="0 0 160 50" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="6" width="10" height="38" rx="1" fill="#e2001a" transform="skewX(-12)"/>
      <rect x="14" y="6" width="10" height="38" rx="1" fill="#e2001a" transform="skewX(-12)"/>
      <text x="34" y="38" font-family="Arial Black, sans-serif" font-size="30" font-weight="900" fill="#e2001a" letter-spacing="1">MASA</text>
    </svg>
    <div class="login-titulo">PANEL DE SUPERVISOR</div>
    <input type="password" class="login-input" id="login-input" placeholder="····" maxlength="6"
      onkeydown="if(event.key==='Enter') verificarLogin()" />
    <button class="btn-login" onclick="verificarLogin()">ENTRAR</button>
    <div class="login-error" id="login-error">Contraseña incorrecta</div>
  </div>
</div>

<div id="app">
  <header>
    <svg viewBox="0 0 160 50" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="6" width="10" height="38" rx="1" fill="#e2001a" transform="skewX(-12)"/>
      <rect x="14" y="6" width="10" height="38" rx="1" fill="#e2001a" transform="skewX(-12)"/>
      <text x="34" y="38" font-family="Arial Black, sans-serif" font-size="30" font-weight="900" fill="#e2001a" letter-spacing="1">MASA</text>
    </svg>
    <div class="header-titulo">Panel Supervisor</div>
    <button class="btn-cerrar" onclick="cerrarSesion()">Cerrar sesión</button>
  </header>

  <div class="container">

    <div class="resumen-cards">
      <div class="card">
        <div class="card-valor" id="card-partes">—</div>
        <div class="card-label">Partes</div>
      </div>
      <div class="card">
        <div class="card-valor" id="card-normales">—</div>
        <div class="card-label">Horas Normales</div>
      </div>
      <div class="card">
        <div class="card-valor" id="card-extra">—</div>
        <div class="card-label">Horas Extra</div>
      </div>
      <div class="card">
        <div class="card-valor" id="card-llamadas">—</div>
        <div class="card-label">Llamadas Retén</div>
      </div>
    </div>

    <div class="filtros-panel">
      <div class="filtros-titulo">Filtros</div>

      <div class="tabs" style="margin-bottom:16px">
        <div class="tab activo" id="tab-dia" onclick="cambiarVista('dia')">Por Día</div>
        <div class="tab" id="tab-trabajador" onclick="cambiarVista('trabajador')">Por Trabajador</div>
      </div>

      <div class="filtros-fila">
        <div class="filtro-grupo" id="filtro-fecha">
          <div class="filtro-label">Fecha</div>
          <input type="date" id="input-fecha" />
        </div>

        <div class="filtro-grupo" id="filtro-trabajador" style="display:none">
          <div class="filtro-label">Trabajador</div>
          <select id="select-trabajador">
            <option value="">— Todos —</option>
          </select>
        </div>

        <div class="filtro-grupo" id="filtro-mes" style="display:none">
          <div class="filtro-label">Mes</div>
          <input type="month" id="input-mes" class="input-edit" />
        </div>

        <div class="filtro-grupo">
          <div class="filtro-label">Obra</div>
          <select id="select-obra">
            <option value="">— Todas —</option>
          </select>
        </div>

        <button class="btn-buscar" onclick="buscar()">BUSCAR</button>
        <button class="btn-excel" onclick="exportarExcel()">⬇ EXCEL</button>
      </div>
    </div>

    <div id="resultados"></div>

  </div>
</div>

<div class="modal-overlay" id="modal-edit">
  <div class="modal-content">
    <div class="modal-titulo" id="edit-titulo">Editar Parte</div>
    <div class="grid-edit">
      <div>
        <label class="input-label">Horas Normales</label>
        <input type="number" id="edit-hn" step="0.5" class="input-edit">
      </div>
      <div>
        <label class="input-label">Horas Extra</label>
        <input type="number" id="edit-he" step="0.5" class="input-edit">
      </div>
      <div>
        <label class="input-label">Llamadas Retén</label>
        <input type="number" id="edit-llamadas" class="input-edit">
      </div>
      <div>
        <label class="input-label">Retén</label>
        <select id="edit-reten" class="input-edit">
          <option value="ninguno">Ninguno</option>
          <option value="diario">Diario</option>
          <option value="fin_de_semana">Fin de Semana</option>
          <option value="festivo">Festivo</option>
          <option value="semanal">Semanal</option>
        </select>
      </div>
    </div>

    <div class="grid-edit">
        <label style="font-size: 13px; display: flex; align-items: center; gap: 5px;">
            <input type="checkbox" id="edit-noct"> Nocturnidad
        </label>
        <label style="font-size: 13px; display: flex; align-items: center; gap: 5px;">
            <input type="checkbox" id="edit-turn"> Turnicidad
        </label>
        <label style="font-size: 13px; display: flex; align-items: center; gap: 5px;">
            <input type="checkbox" id="edit-ent"> Entrada
        </label>
        <label style="font-size: 13px; display: flex; align-items: center; gap: 5px;">
            <input type="checkbox" id="edit-tall"> Taller
        </label>
    </div>

    <div class="edit-obras-list" id="edit-obras-container">
        </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-save" onclick="guardarEdicion()">Guardar Cambios</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://mudtiqquxycgrzisiydu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11ZHRpcXF1eHljZ3J6aXNpeWR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxODUxNTgsImV4cCI6MjA5MTc2MTE1OH0.fNKzBcz1wmPccXGy2gWpe78tSzTQj5-z9xYeh2BddoM';
const PASS = '3254';

const headers = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`
};

let vistaActual = 'dia';
let trabajadores = [];
let obras = [];
let datosActuales = [];
let parteEnEdicion = null;

const hoy = new Date().toISOString().split('T')[0];
const mesActual = hoy.slice(0, 7);

function verificarLogin() {
  const val = document.getElementById('login-input').value;
  if (val === PASS) {
    document.getElementById('pantalla-login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    inicializar();
  } else {
    const inp = document.getElementById('login-input');
    inp.classList.add('error');
    document.getElementById('login-error').style.display = 'block';
    setTimeout(() => inp.classList.remove('error'), 400);
  }
}

function cerrarSesion() {
  document.getElementById('pantalla-login').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-input').value = '';
}

async function inicializar() {
  document.getElementById('input-fecha').value = hoy;
  document.getElementById('input-mes').value = mesActual;

  const [rT, rO] = await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/trabajadores?activo=eq.true&order=nombre`, { headers }),
    fetch(`${SUPABASE_URL}/rest/v1/obras?activa=eq.true&order=nombre`, { headers })
  ]);
  trabajadores = await rT.json();
  obras = await rO.json();

  const selT = document.getElementById('select-trabajador');
  trabajadores.forEach(t => {
    const o = document.createElement('option');
    o.value = t.id; o.textContent = t.nombre;
    selT.appendChild(o);
  });

  const selO = document.getElementById('select-obra');
  obras.forEach(o => {
    const op = document.createElement('option');
    op.value = o.id; op.textContent = o.nombre;
    selO.appendChild(op);
  });

  buscar();
}

function cambiarVista(vista) {
  vistaActual = vista;
  document.getElementById('tab-dia').classList.toggle('activo', vista === 'dia');
  document.getElementById('tab-trabajador').classList.toggle('activo', vista === 'trabajador');
  document.getElementById('filtro-fecha').style.display = vista === 'dia' ? 'flex' : 'none';
  document.getElementById('filtro-trabajador').style.display = vista === 'trabajador' ? 'flex' : 'none';
  document.getElementById('filtro-mes').style.display = vista === 'trabajador' ? 'flex' : 'none';
  buscar();
}

async function buscar() {
  document.getElementById('resultados').innerHTML = `<div class="loading"><div class="spinner"></div>Cargando partes...</div>`;

  try {
    let url = `${SUPABASE_URL}/rest/v1/partes?select=*,trabajadores(nombre),partes_obras(*,obras(nombre))&order=created_at.desc`;

    if (vistaActual === 'dia') {
      const fecha = document.getElementById('input-fecha').value;
      if (fecha) url += `&fecha=eq.${fecha}`;
    } else {
      const trabId = document.getElementById('select-trabajador').value;
      const mes = document.getElementById('input-mes').value;
      if (trabId) url += `&trabajador_id=eq.${trabId}`;
      if (mes) {
        url += `&fecha=gte.${mes}-01&fecha=lte.${mes}-31`;
      }
    }

    const obraId = document.getElementById('select-obra').value;
    const res = await fetch(url, { headers });
    let partes = await res.json();

    if (obraId) {
      partes = partes.filter(p => p.partes_obras?.some(po => po.obra_id == obraId));
    }

    datosActuales = partes;
    actualizarCards(partes);

    if (vistaActual === 'dia') renderTabla(partes);
    else renderPorTrabajador(partes);

  } catch(e) {
    document.getElementById('resultados').innerHTML = `<div class="sin-datos">⚠️ Error de conexión</div>`;
  }
}

function actualizarCards(partes) {
  const totalNormales = partes.reduce((s, p) => s + (p.horas_normales || 0), 0);
  const totalExtra = partes.reduce((s, p) => s + (p.horas_extra || 0), 0);
  const totalLlamadas = partes.reduce((s, p) => s + (p.llamadas || 0), 0);
  document.getElementById('card-partes').textContent = partes.length;
  document.getElementById('card-normales').textContent = totalNormales.toFixed(1);
  document.getElementById('card-extra').textContent = totalExtra.toFixed(1);
  document.getElementById('card-llamadas').textContent = totalLlamadas;
}

function renderTabla(partes) {
  if (partes.length === 0) {
    document.getElementById('resultados').innerHTML = `<div class="tabla-panel"><div class="sin-datos">No hay partes</div></div>`;
    return;
  }

  const fecha = document.getElementById('input-fecha').value;
  const fechaFormateada = fecha ? new Date(fecha + 'T12:00:00').toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long', year:'numeric' }) : '';

  let html = `
    <div class="tabla-panel">
      <div class="tabla-header">
        <div class="tabla-titulo">${fechaFormateada}</div>
        <div class="tabla-count">${partes.length} parte${partes.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="tabla-wrapper">
        <table>
          <thead>
            <tr>
              <th></th>
              <th>Trabajador</th>
              <th>Turno</th>
              <th>Obras</th>
              <th>H. Normales</th>
              <th>H. Extra</th>
              <th>Pluses</th>
              <th>Retén</th>
              <th>Llamadas</th>
            </tr>
          </thead>
          <tbody>`;

  partes.forEach(p => {
    const po = p.partes_obras || [];
    const pluses = [];
    if (p.plus_nocturnidad) pluses.push('<span class="badge badge-azul">NOCTURNIDAD</span>');
    if (p.plus_turnicidad) pluses.push('<span class="badge badge-azul">TURNICIDAD</span>');
    if (p.plus_entrada) pluses.push('<span class="badge badge-amarillo">ENTRADA</span>');
    if (p.plus_taller) pluses.push('<span class="badge badge-amarillo">TALLER</span>');

    const retenTexto = { 'ninguno': '', 'diario': 'Diario', 'fin_de_semana': 'F.Semana', 'festivo': 'Festivo', 'semanal': 'Semanal' }[p.reten] || '';

    html += `
      <tr>
        <td><button class="btn-expandir" onclick="toggleDetalle(${p.id})" id="btn-${p.id}">▶</button></td>
        <td><div class="nombre-trabajador">${p.trabajadores?.nombre || '—'}</div></td>
        <td><span class="badge ${p.turno === 'mañana' ? 'badge-verde' : 'badge-azul'}">${p.turno === 'mañana' ? '8H' : '12H'}</span></td>
        <td>${po.map(o => `<span class="obra-tag">${o.obras?.nombre || '—'} <strong>${o.horas}h</strong></span>`).join('')}</td>
        <td><span class="horas-cell horas-normales">${p.horas_normales || 0}</span></td>
        <td><span class="horas-cell horas-extra">${p.horas_extra || 0}</span></td>
        <td>${pluses.join('') || '—'}</td>
        <td>${retenTexto ? `<span class="badge badge-azul">${retenTexto}</span>` : '—'}</td>
        <td>${p.llamadas > 0 ? `<span class="badge badge-rojo">${p.llamadas}</span>` : '0'}</td>
      </tr>
      <tr class="fila-detalle" id="detalle-${p.id}">
        <td colspan="9">
          <div class="detalle-contenido">
            <div class="detalle-header-flex">
                <div style="font-weight:700; color:var(--rojo); font-size:12px;">DETALLE DE OBRAS Y ACCIONES</div>
                <div class="acciones-parte">
                    <button class="btn-accion btn-edit" onclick="abrirEditar(${p.id})">EDITAR PARTE</button>
                    <button class="btn-accion btn-delete" onclick="eliminarParte(${p.id})">ELIMINAR</button>
                </div>
            </div>
            <div class="detalle-obras">
              ${po.map(o => `
                <div class="detalle-obra-item">
                  <div style="flex:1">
                    <div class="detalle-obra-nombre">${o.obras?.nombre || '—'}</div>
                    ${o.comentarios ? `<div class="detalle-obra-comentario">"${o.comentarios}"</div>` : ''}
                  </div>
                  <div class="detalle-obra-horas">${o.horas}h</div>
                </div>`).join('')}
            </div>
          </div>
        </td>
      </tr>`;
  });

  html += `</tbody></table></div></div>`;
  document.getElementById('resultados').innerHTML = html;
}

function renderPorTrabajador(partes) {
  if (partes.length === 0) {
    document.getElementById('resultados').innerHTML = `<div class="sin-datos">No hay datos</div>`;
    return;
  }

  const grupos = {};
  partes.forEach(p => {
    const nombre = p.trabajadores?.nombre || 'Desconocido';
    if (!grupos[nombre]) grupos[nombre] = [];
    grupos[nombre].push(p);
  });

  let html = '';
  Object.entries(grupos).sort().forEach(([nombre, partesTrab]) => {
    const tN = partesTrab.reduce((s, p) => s + (p.horas_normales || 0), 0);
    const tE = partesTrab.reduce((s, p) => s + (p.horas_extra || 0), 0);

    html += `
      <div class="trabajador-seccion">
        <div class="trabajador-seccion-header">
          <div class="trabajador-seccion-nombre">${nombre}</div>
          <div class="trabajador-resumen">
            <div class="trab-res-item"><div class="trab-res-valor" style="color:var(--rojo)">${partesTrab.length}</div><div class="trab-res-label">Días</div></div>
            <div class="trab-res-item"><div class="trab-res-valor" style="color:var(--verde)">${tN.toFixed(1)}</div><div class="trab-res-label">H. Norm.</div></div>
            <div class="trab-res-item"><div class="trab-res-valor" style="color:var(--amarillo)">${tE.toFixed(1)}</div><div class="trab-res-label">H. Extra</div></div>
          </div>
        </div>
        <div class="tabla-wrapper">
          <table>
            <thead><tr><th>Fecha</th><th>Turno</th><th>Obras</th><th>H. Norm</th><th>H. Extra</th><th>Acción</th></tr></thead>
            <tbody>`;

    partesTrab.sort((a,b) => a.fecha > b.fecha ? 1 : -1).forEach(p => {
      html += `
        <tr>
          <td style="font-weight:600">${new Date(p.fecha + 'T12:00:00').toLocaleDateString('es-ES', {day:'numeric', month:'short'})}</td>
          <td><span class="badge ${p.turno === 'mañana' ? 'badge-verde' : 'badge-azul'}">${p.turno}</span></td>
          <td>${p.partes_obras?.map(o => `<span class="obra-tag">${o.obras?.nombre}</span>`).join(' ')}</td>
          <td>${p.horas_normales}</td>
          <td>${p.horas_extra}</td>
          <td><button class="btn-accion btn-edit" style="padding:2px 8px" onclick="abrirEditar(${p.id})">Edit</button></td>
        </tr>`;
    });
    html += `</tbody></table></div></div>`;
  });
  document.getElementById('resultados').innerHTML = html;
}

function toggleDetalle(id) {
  const fila = document.getElementById(`detalle-${id}`);
  const btn = document.getElementById(`btn-${id}`);
  fila.classList.toggle('visible');
  btn.classList.toggle('abierto');
}

// FUNCIONES DE EDICIÓN
function abrirEditar(id) {
    parteEnEdicion = datosActuales.find(p => p.id === id);
    if (!parteEnEdicion) return;

    document.getElementById('edit-titulo').textContent = `Editar Parte: ${parteEnEdicion.trabajadores?.nombre} (${parteEnEdicion.fecha})`;
    document.getElementById('edit-hn').value = parteEnEdicion.horas_normales;
    document.getElementById('edit-he').value = parteEnEdicion.horas_extra;
    document.getElementById('edit-llamadas').value = parteEnEdicion.llamadas;
    document.getElementById('edit-reten').value = parteEnEdicion.reten;
    
    document.getElementById('edit-noct').checked = parteEnEdicion.plus_nocturnidad;
    document.getElementById('edit-turn').checked = parteEnEdicion.plus_turnicidad;
    document.getElementById('edit-ent').checked = parteEnEdicion.plus_entrada;
    document.getElementById('edit-tall').checked = parteEnEdicion.plus_taller;

    const container = document.getElementById('edit-obras-container');
    container.innerHTML = '<div style="font-weight:700; margin-bottom:10px; font-size:12px">DESGLOSE POR OBRA:</div>';
    
    parteEnEdicion.partes_obras.forEach((po, idx) => {
        container.innerHTML += `
            <div class="edit-obra-card">
                <div style="font-weight:700; font-size:13px; margin-bottom:8px">${po.obras?.nombre}</div>
                <div class="grid-edit">
                    <div>
                        <label class="input-label">Horas en esta obra</label>
                        <input type="number" step="0.5" class="input-edit po-horas" data-id="${po.id}" value="${po.horas}">
                    </div>
                    <div>
                        <label class="input-label">Comentario</label>
                        <input type="text" class="input-edit po-coment" data-id="${po.id}" value="${po.comentarios || ''}">
                    </div>
                </div>
            </div>
        `;
    });

    document.getElementById('modal-edit').style.display = 'flex';
}

function cerrarModal() {
    document.getElementById('modal-edit').style.display = 'none';
    parteEnEdicion = null;
}

async function guardarEdicion() {
    if (!parteEnEdicion) return;

    const payloadParte = {
        horas_normales: parseFloat(document.getElementById('edit-hn').value),
        horas_extra: parseFloat(document.getElementById('edit-he').value),
        llamadas: parseInt(document.getElementById('edit-llamadas').value),
        reten: document.getElementById('edit-reten').value,
        plus_nocturnidad: document.getElementById('edit-noct').checked,
        plus_turnicidad: document.getElementById('edit-turn').checked,
        plus_entrada: document.getElementById('edit-ent').checked,
        plus_taller: document.getElementById('edit-tall').checked
    };

    try {
        // 1. Actualizar tabla principal
        await fetch(`${SUPABASE_URL}/rest/v1/partes?id=eq.${parteEnEdicion.id}`, {
            method: 'PATCH',
            headers,
            body: JSON.stringify(payloadParte)
        });

        // 2. Actualizar cada línea de obra
        const promesasObras = [];
        document.querySelectorAll('.po-horas').forEach(input => {
            const poId = input.dataset.id;
            const h = parseFloat(input.value);
            const c = document.querySelector(`.po-coment[data-id="${poId}"]`).value;
            
            promesasObras.push(
                fetch(`${SUPABASE_URL}/rest/v1/partes_obras?id=eq.${poId}`, {
                    method: 'PATCH',
                    headers,
                    body: JSON.stringify({ horas: h, comentarios: c })
                })
            );
        });

        await Promise.all(promesasObras);
        alert('Parte actualizado correctamente');
        cerrarModal();
        buscar();
    } catch (e) {
        alert('Error al guardar');
    }
}

async function eliminarParte(id) {
    if (!confirm('¿Estás seguro de que quieres borrar este parte? Esta acción no se puede deshacer.')) return;

    try {
        // Supabase por defecto no borra en cascada si no está configurado, así que borramos primero las obras vinculadas
        await fetch(`${SUPABASE_URL}/rest/v1/partes_obras?parte_id=eq.${id}`, { method: 'DELETE', headers });
        await fetch(`${SUPABASE_URL}/rest/v1/partes?id=eq.${id}`, { method: 'DELETE', headers });
        
        alert('Parte eliminado');
        buscar();
    } catch (e) {
        alert('Error al eliminar');
    }
}

// EXCEL (Original intacto)
function exportarExcel() {
  if (!datosActuales.length) { alert('No hay datos'); return; }
  const filas = [];
  datosActuales.forEach(p => {
    (p.partes_obras || [{}]).forEach(o => {
      filas.push({
        'Fecha': p.fecha,
        'Trabajador': p.trabajadores?.nombre || '',
        'Turno': p.turno,
        'Obra': o.obras?.nombre || '',
        'Horas Obra': o.horas || '',
        'H. Normales': p.horas_normales || 0,
        'H. Extra': p.horas_extra || 0,
        'Retén': p.reten,
        'Llamadas': p.llamadas || 0,
        'Comentario': o.comentarios || ''
      });
    });
  });
  const ws = XLSX.utils.json_to_sheet(filas);
  ws['!cols'] = [{wch:12},{wch:30},{wch:10},{wch:30},{wch:10},{wch:10},{wch:10},{wch:12},{wch:10},{wch:40}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Partes');
  XLSX.writeFile(wb, `Partes_MASA_${new Date().toLocaleDateString()}.xlsx`);
}
</script>
</body>
</html>
